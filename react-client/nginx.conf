map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: let React Router-less client-side routing (if any) fall back to index.html.
    location / {
        try_files $uri /index.html;
    }

    # REST API -> Spring Boot backend.
    location /api/ {
        proxy_pass http://chat-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket / SockJS endpoint -> Spring Boot backend. The Upgrade/Connection headers are
    # what make this a real WebSocket proxy instead of a plain HTTP reverse proxy; SockJS's
    # HTTP fallback transports (xhr-streaming, polling, etc.) ride the same location block.
    location /ws/ {
        proxy_pass http://chat-service:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /actuator/health {
        proxy_pass http://chat-service:8080/actuator/health;
    }
}
