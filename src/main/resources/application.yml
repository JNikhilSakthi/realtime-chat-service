server:
  port: 8080

spring:
  application:
    name: realtime-chat-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:chatuser}
    password: ${DB_PASSWORD:chatpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Application-specific settings.
chat:
  websocket:
    # Comma-separated list, resolved to String[] by Spring's relaxed binding via @Value.
    allowed-origin-patterns: ${CHAT_ALLOWED_ORIGINS:*}
  cors:
    allowed-origins: ${CHAT_ALLOWED_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medha.realtimechatservice: INFO
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
