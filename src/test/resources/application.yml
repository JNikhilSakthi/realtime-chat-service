spring:
  datasource:
    url: jdbc:h2:mem:chatdb-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

chat:
  websocket:
    allowed-origin-patterns: "*"
  cors:
    allowed-origins: "*"

logging:
  level:
    root: WARN
